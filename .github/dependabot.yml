version: 2
updates:
  # Keep the GitHub Actions used by CI up to date. Low noise, high value.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  # Track the project's real install manifest only. The
  # requirements_current_working_state*.txt files are full conda-env
  # snapshots kept for reference, not installable manifests, so they are
  # intentionally not managed here.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python
    allow:
      - dependency-type: direct
