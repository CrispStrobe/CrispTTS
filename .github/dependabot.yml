version: 2
updates:
  # Keep the GitHub Actions used by CI up to date. Low noise, high value.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  # requirements.txt is a hand-tuned "tested working configuration" with
  # documented cross-package constraints (e.g. librosa<0.11 for chatterbox,
  # matched torch/torchaudio bounds), and the env-snapshot-*.txt files are
  # reference snapshots. Routine version bumps fight those locks, so pip is
  # restricted to security updates only (open-pull-requests-limit: 0 disables
  # version-update PRs while still allowing Dependabot security updates).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python
