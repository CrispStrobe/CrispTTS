name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0). Created at the current commit if it does not exist."
        required: true

# Need write access to create the GitHub Release and tag.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build + dev dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"

      # Gate the release on a green test suite so we never ship a broken tag.
      - name: Run test suite
        run: pytest

      - name: Verify package version matches the tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$TAG project_version=$VERSION"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject version v$VERSION"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          rm -rf dist
          python -m build

      - name: Show artifacts
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # No --verify-tag: accept an existing pushed tag, or create the tag
          # at the current commit when triggered via workflow_dispatch.
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes
